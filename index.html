<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

<title>Flower Story</title>

<!-- iOS app-like behavior -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flower Story">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;

  font-family: "Comic Sans MS", "Comic Sans", "Chalkboard SE", "Marker Felt", cursive;

  /* NEW BACKGROUND */
  background: url("https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/0bd85dc1-8dbc-4ae9-b532-e664e90c9e8c/dg7pab1-57024b30-d524-4791-8b48-4d1e7cd95053.png")
    no-repeat center center fixed;
  background-size: cover;
}

/* soft bright overlay (dreamy daylight) */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(255, 255, 255, 0.08);
  z-index: 2;
}

canvas {
  position: fixed;
  inset: 0;
  z-index: 1;
}

#card {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;

  font-size: 28px;
  padding: 40px;
  color: white;

  z-index: 3;

  transition: opacity 0.25s ease, transform 0.25s ease;
}

.hint {
  position: fixed;
  bottom: env(safe-area-inset-bottom, 20px);
  right: 20px;
  font-size: 14px;
  opacity: 0.75;
  z-index: 4;
  color: white;
  pointer-events: none;
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div class="overlay"></div>

<div id="card">I spent hours on this</div>
<div class="hint">Swipe →</div>

<script>

/* ---------------- STORY ---------------- */
const slides = [
  "I spent hours on this",
  "Making a website to give you flowers",
  "I Almost Thought It Wasn't Worth It",
  "Until I remembered your smile"
];

let stage = 0;
let startX = 0;

/* ---------------- SWIPE ---------------- */
document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
}, {passive:true});

document.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - startX;
  if (dx < -40) next();
});

document.addEventListener("click", next);

function next() {
  const card = document.getElementById("card");
  stage++;

  if (stage < slides.length) {
    card.style.opacity = 0;
    card.style.transform = "translateY(-10px)";

    setTimeout(() => {
      card.innerText = slides[stage];
      card.style.opacity = 1;
      card.style.transform = "translateY(0)";
    }, 200);

    return;
  }

  startFinal();
}

/* ---------------- CANVAS ---------------- */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
window.addEventListener("resize", resize);
resize();

ctx.imageSmoothingEnabled = true;

/* ---------------- ASSETS ---------------- */
const flowerSources = [
  "https://upload.wikimedia.org/wikipedia/commons/f/fc/Blue_Flower_Transparent_Background.png",
  "https://www.onlygfx.com/wp-content/uploads/2016/05/red-rose-1.png",
  "https://static.vecteezy.com/system/resources/thumbnails/041/669/284/small/ai-generated-bright-white-flower-with-elegant-petals-on-transparent-background-stock-png.png",
  "https://static.vecteezy.com/system/resources/thumbnails/041/669/348/small/ai-generated-vibrant-yellow-cosmos-flower-with-delicate-petals-on-transparent-background-stock-png.png"
];

const leafSources = [
  "https://png.pngtree.com/png-clipart/20240420/original/pngtree-green-leaf-for-element-png-image_14904901.png",
  "https://gallery.yopriceville.com/var/albums/Free-Clipart-Pictures/Decorative-Elements-PNG/Leaf_PNG_Clipart.png"
];

function load(arr) {
  return arr.map(src => {
    const img = new Image();
    img.src = src;
    return img;
  });
}

const flowers = [];
const leaves = [];

const flowerImgs = load(flowerSources);
const leafImgs = load(leafSources);

/* ---------------- PARTICLES ---------------- */
function spawnFlower(x = Math.random() * canvas.width, y = Math.random() * canvas.height) {
  flowers.push({
    x,
    y,
    vx: (Math.random() - 0.5) * 2,
    vy: (Math.random() - 2),
    size: 40 + Math.random() * 50,
    img: flowerImgs[Math.floor(Math.random() * flowerImgs.length)],
    rot: Math.random() * Math.PI
  });
}

function spawnLeaf() {
  leaves.push({
    x: -50,
    y: Math.random() * canvas.height,
    vx: 2 + Math.random() * 2,
    vy: (Math.random() - 0.5),
    size: 20 + Math.random() * 20,
    img: leafImgs[Math.floor(Math.random() * leafImgs.length)],
    rot: Math.random() * Math.PI
  });
}

/* ---------------- FINAL ---------------- */
function startFinal() {
  document.getElementById("card").style.display = "none";
  document.querySelector(".hint").style.display = "none";

  for (let i = 0; i < 50; i++) spawnFlower();

  setInterval(() => {
    spawnFlower(
      Math.random() * canvas.width,
      Math.random() * canvas.height
    );
  }, 180);
}

/* ---------------- LOOP ---------------- */
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // leaves
  for (let i = 0; i < leaves.length; i++) {
    const l = leaves[i];
    l.x += l.vx;
    l.y += l.vy;
    l.rot += 0.01;

    ctx.save();
    ctx.translate(l.x, l.y);
    ctx.rotate(l.rot);
    ctx.drawImage(l.img, -l.size/2, -l.size/2, l.size, l.size);
    ctx.restore();

    if (l.x > canvas.width + 100) leaves.splice(i, 1);
  }

  // flowers
  for (let i = 0; i < flowers.length; i++) {
    const f = flowers[i];
    f.x += f.vx;
    f.y += f.vy;
    f.vy += 0.01;
    f.rot += 0.02;

    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rot);
    ctx.drawImage(f.img, -f.size/2, -f.size/2, f.size, f.size);
    ctx.restore();
  }

  requestAnimationFrame(animate);
}
animate();

/* ambient leaves */
setInterval(() => {
  if (stage >= slides.length - 1) return;
  spawnLeaf();
}, 300);

</script>

</body>
</html>
