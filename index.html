<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Flower Story</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: "Comic Sans MS", cursive;
    background: url("https://img.magnific.com/free-vector/watercolor-natutral-landscape-with-trees_23-2148235621.jpg?semt=ais_hybrid&w=740&q=80")
      no-repeat center center fixed;
    background-size: cover;
    touch-action: none;
  }

  canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.25);
    z-index: 2;
  }

  #card {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-size: 28px;
    padding: 40px;
    color: white;
    z-index: 3;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }

  .hint {
    position: fixed;
    bottom: env(safe-area-inset-bottom, 20px);
    right: 20px;
    font-size: 14px;
    opacity: 0.7;
    z-index: 4;
    color: white;
  }
</style>
</head>

<body>

<canvas id="c"></canvas>
<div class="overlay"></div>

<div id="card">I spent hours on this</div>
<div class="hint">Swipe →</div>

<script>
/* -------------------------
   STORY
--------------------------*/
const slides = [
  "I spent hours on this",
  "Making a website to give you flowers",
  "I Almost Thought It Wasn't Worth It",
  "Until I remembered your smile"
];

let stage = 0;

/* -------------------------
   SWIPE (REAL DRAG FEEL)
--------------------------*/
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
}, {passive:true});

document.addEventListener("touchend", e => {
  let dx = e.changedTouches[0].clientX - startX;
  if (dx < -40) next();
});

document.addEventListener("click", next);

function next() {
  const card = document.getElementById("card");

  stage++;

  if (stage < slides.length) {
    card.style.opacity = 0;
    card.style.transform = "translateY(-10px)";

    setTimeout(() => {
      card.innerText = slides[stage];
      card.style.opacity = 1;
      card.style.transform = "translateY(0px)";
    }, 200);

    return;
  }

  startFinalScene();
}

/* -------------------------
   CANVAS ENGINE
--------------------------*/
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* images */
const flowerImgs = [];
const leafImg = new Image();
leafImg.src = "https://i.pinimg.com/736x/71/8b/ec/718becda788a978ea464c6e82f89a9fa.jpg";

const flowerSources = [
  "https://png.pngtree.com/png-vector/20240720/ourlarge/pngtree-pink-flower-isolated-on-transparent-background-png-image_13159944.png",
  "https://img.magnific.com/free-psd/vibrant-red-zinnia-bloom_632498-25864.jpg?semt=ais_hybrid&w=740&q=80",
  "https://img.magnific.com/free-psd/elegant-pink-rose-vine-corner-design-perfect-wedding-invitations-romantic-cards_191095-78627.jpg",
  "https://img.magnific.com/premium-psd/begonia-flower-isolated-transparent-background_191095-29482.jpg"
];

flowerSources.forEach(src => {
  const img = new Image();
  img.src = src;
  flowerImgs.push(img);
});

/* particles */
const flowers = [];
const leaves = [];

/* -------------------------
   FLOWER PARTICLE
--------------------------*/
function spawnFlower() {
  flowers.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 1.5,
    vy: (Math.random() - 1.5),
    size: 40 + Math.random() * 40,
    img: flowerImgs[Math.floor(Math.random() * flowerImgs.length)],
    rot: Math.random() * Math.PI
  });
}

/* -------------------------
   LEAF PARTICLE
--------------------------*/
function spawnLeaf() {
  leaves.push({
    x: -50,
    y: Math.random() * canvas.height,
    vx: 2 + Math.random() * 2,
    vy: (Math.random() - 0.5),
    size: 25 + Math.random() * 15,
    rot: Math.random() * Math.PI
  });
}

/* -------------------------
   FINAL SCENE
--------------------------*/
function startFinalScene() {
  document.getElementById("card").style.display = "none";
  document.querySelector(".hint").style.display = "none";

  // burst
  for (let i = 0; i < 40; i++) spawnFlower();

  setInterval(() => {
    for (let i = 0; i < 2; i++) spawnFlower();
  }, 200);
}

/* -------------------------
   ANIMATION LOOP
--------------------------*/
function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  /* leaves */
  for (let i = 0; i < leaves.length; i++) {
    const l = leaves[i];
    l.x += l.vx;
    l.y += l.vy;
    l.rot += 0.01;

    ctx.save();
    ctx.translate(l.x, l.y);
    ctx.rotate(l.rot);
    ctx.drawImage(leafImg, -l.size/2, -l.size/2, l.size, l.size);
    ctx.restore();

    if (l.x > canvas.width + 100) leaves.splice(i,1);
  }

  /* flowers */
  for (let i = 0; i < flowers.length; i++) {
    const f = flowers[i];
    f.x += f.vx;
    f.y += f.vy;
    f.vy += 0.01; // gravity
    f.rot += 0.02;

    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rot);
    ctx.drawImage(f.img, -f.size/2, -f.size/2, f.size, f.size);
    ctx.restore();
  }

  requestAnimationFrame(animate);
}
animate();

/* ambient leaves always */
setInterval(() => {
  if (stage >= slides.length - 1) return;
  leaves.push({
    x: -50,
    y: Math.random() * canvas.height,
    vx: 2 + Math.random() * 2,
    vy: (Math.random() - 0.5),
    size: 20 + Math.random() * 20,
    rot: 0
  });
}, 300);
</script>

</body>
</html>
