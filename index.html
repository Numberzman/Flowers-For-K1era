<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A Moment for You 🌸</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        height: 100vh;
        font-family: Georgia, serif;
        background: linear-gradient(to top, #f7dce5, #fffafc);
    }

    #garden {
        position: absolute;
        width: 100%;
        height: 100%;
    }

    .flower {
        position: absolute;
        font-size: 28px;
        transform: scale(0);
        animation: bloom 1.2s ease-out forwards, float 6s ease-in-out infinite;
        opacity: 0;
    }

    @keyframes bloom {
        to {
            transform: scale(1);
            opacity: 1;
        }
    }

    @keyframes float {
        0% { transform: translateY(0px) scale(1); }
        50% { transform: translateY(-10px) scale(1.05); }
        100% { transform: translateY(0px) scale(1); }
    }

    .message {
        position: absolute;
        width: 100%;
        text-align: center;
        top: 45%;
        transform: translateY(-50%);
        font-size: clamp(2rem, 5vw, 3.5rem);
        color: #8a4b6a;
        opacity: 0;
        animation: fadeIn 2.5s ease forwards;
        animation-delay: 3s;
        padding: 0 20px;
    }

    .sub {
        font-size: 1rem;
        margin-top: 10px;
        opacity: 0.7;
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }
</style>
</head>

<body>

<div id="garden"></div>

<div class="message">
    You're So Pretty,<br>
    Here's A Fake Field Of Flowers Just For You 🙃
    <div class="sub">I hope your day feels lighter after this</div>
</div>

<script>
const garden = document.getElementById("garden");

let count = 0;

function spawnFlower() {
    const flower = document.createElement("div");
    flower.className = "flower";
    flower.innerText = "🌸";

    const row = Math.floor(count / 12);
    const col = count % 12;

    const spacingX = window.innerWidth / 12;
    const spacingY = window.innerHeight / 10;

    flower.style.left = (col * spacingX + (Math.random()*20 - 10)) + "px";
    flower.style.top = (row * spacingY + (Math.random()*20 - 10)) + "px";

    flower.style.animationDelay = (count * 0.05) + "s";

    garden.appendChild(flower);
    count++;
}

for (let i = 0; i < 80; i++) {
    spawnFlower();
}
</script>

</body>
</html>
